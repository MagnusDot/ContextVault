<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif">
  <title>Cumulative token consumption over 30 days using measured benchmark reduction</title>
  <rect width="800" height="360" fill="#0d1117" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">30-day projection from measured benchmark savings</text>
  <text x="400" y="50" text-anchor="middle" fill="#8b949e" font-size="10">5 sessions/day · 18k baseline tokens/session · $3 / 1M input tokens</text>

  <line x1="80" y1="80" x2="735" y2="80" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="130" x2="735" y2="130" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="180" x2="735" y2="180" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="230" x2="735" y2="230" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="280" x2="735" y2="280" stroke="#21262d" stroke-width="1"/>

  <line x1="80" y1="80" x2="80" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <line x1="80" y1="280" x2="735" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <text x="72" y="84" text-anchor="end" fill="#6e7681" font-size="9">2.70M</text>
  <text x="72" y="134" text-anchor="end" fill="#6e7681" font-size="9">2.03M</text>
  <text x="72" y="184" text-anchor="end" fill="#6e7681" font-size="9">1.35M</text>
  <text x="72" y="234" text-anchor="end" fill="#6e7681" font-size="9">675k</text>
  <text x="72" y="284" text-anchor="end" fill="#6e7681" font-size="9">0</text>

  <text x="80" y="298" text-anchor="middle" fill="#6e7681" font-size="9">Day 0</text>
  <text x="189" y="298" text-anchor="middle" fill="#6e7681" font-size="9">Day 5</text>
  <text x="298" y="298" text-anchor="middle" fill="#6e7681" font-size="9">Day 10</text>
  <text x="408" y="298" text-anchor="middle" fill="#6e7681" font-size="9">Day 15</text>
  <text x="517" y="298" text-anchor="middle" fill="#6e7681" font-size="9">Day 20</text>
  <text x="626" y="298" text-anchor="middle" fill="#6e7681" font-size="9">Day 25</text>
  <text x="735" y="298" text-anchor="middle" fill="#6e7681" font-size="9">Day 30</text>

  <polygon points="80,280 189,247 298,213 408,180 517,147 626,113 735,80 735,280" fill="#f85149" fill-opacity="0.07"/>
  <polyline points="80,280 189,247 298,213 408,180 517,147 626,113 735,80" fill="none" stroke="#f85149" stroke-width="2.8" stroke-linejoin="round"/>
  <circle cx="735" cy="80" r="5" fill="#f85149"/>

  <polygon points="80,280 189,265 298,249 408,234 517,219 626,203 735,188 735,280" fill="#3fb950" fill-opacity="0.12"/>
  <polyline points="80,280 189,265 298,249 408,234 517,219 626,203 735,188" fill="none" stroke="#3fb950" stroke-width="2.8" stroke-linejoin="round"/>
  <circle cx="735" cy="188" r="5" fill="#3fb950"/>

  <rect x="562" y="88" width="150" height="38" fill="#1c0a0a" rx="5" stroke="#f85149" stroke-opacity="0.55"/>
  <text x="637" y="104" text-anchor="middle" fill="#f85149" font-size="10" font-weight="800">2,700,000 tokens</text>
  <text x="637" y="118" text-anchor="middle" fill="#ffa198" font-size="9">≈ $8.10 / month</text>

  <rect x="562" y="198" width="150" height="38" fill="#0a1c0a" rx="5" stroke="#3fb950" stroke-opacity="0.55"/>
  <text x="637" y="214" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="800">1,245,000 tokens</text>
  <text x="637" y="228" text-anchor="middle" fill="#56d364" font-size="9">≈ $3.74 / month</text>

  <rect x="155" y="92" width="230" height="66" fill="#161b22" rx="9" stroke="#1f6feb"/>
  <text x="270" y="114" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="800">53.9% fewer tokens</text>
  <text x="270" y="134" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="900">~$4.36 saved / month</text>
  <text x="270" y="149" text-anchor="middle" fill="#8b949e" font-size="9">per developer · conservative projection</text>

  <line x1="100" y1="332" x2="130" y2="332" stroke="#f85149" stroke-width="2.8"/>
  <text x="136" y="336" fill="#8b949e" font-size="10">Without ContextVault</text>
  <line x1="310" y1="332" x2="340" y2="332" stroke="#3fb950" stroke-width="2.8"/>
  <text x="346" y="336" fill="#8b949e" font-size="10">With ContextVault</text>
</svg>
