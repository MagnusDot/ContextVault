<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif">
  <title>Cumulative token consumption over 30 days</title>
  <rect width="800" height="360" fill="#0d1117" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Cumulative token cost over 30 days</text>
  <text x="400" y="50" text-anchor="middle" fill="#8b949e" font-size="10">5 coding sessions/day · Claude Sonnet ($3 / 1M tokens input)</text>

  <!-- Grid -->
  <line x1="80" y1="70"  x2="755" y2="70"  stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="112" x2="755" y2="112" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="154" x2="755" y2="154" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="196" x2="755" y2="196" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="238" x2="755" y2="238" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="280" x2="755" y2="280" stroke="#21262d" stroke-width="1"/>

  <!-- Y axis -->
  <line x1="80" y1="70" x2="80" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <text x="72" y="74"  text-anchor="end" fill="#6e7681" font-size="9">2.7M</text>
  <text x="72" y="116" text-anchor="end" fill="#6e7681" font-size="9">2.2M</text>
  <text x="72" y="158" text-anchor="end" fill="#6e7681" font-size="9">1.6M</text>
  <text x="72" y="200" text-anchor="end" fill="#6e7681" font-size="9">1.1M</text>
  <text x="72" y="242" text-anchor="end" fill="#6e7681" font-size="9">540k</text>
  <text x="72" y="284" text-anchor="end" fill="#6e7681" font-size="9">0</text>

  <!-- X axis -->
  <line x1="80" y1="280" x2="755" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <text x="80"  y="296" text-anchor="middle" fill="#6e7681" font-size="9">Day 1</text>
  <text x="192" y="296" text-anchor="middle" fill="#6e7681" font-size="9">Day 6</text>
  <text x="305" y="296" text-anchor="middle" fill="#6e7681" font-size="9">Day 12</text>
  <text x="418" y="296" text-anchor="middle" fill="#6e7681" font-size="9">Day 18</text>
  <text x="531" y="296" text-anchor="middle" fill="#6e7681" font-size="9">Day 24</text>
  <text x="644" y="296" text-anchor="middle" fill="#6e7681" font-size="9">Day 30</text>

  <!-- WITHOUT line (red) — 90k tok/day, max 2.7M -->
  <polyline
    points="80,280 103,278 148,274 192,270 237,266 282,262 305,260 350,255 395,250 418,247 463,242 508,237 531,234 576,228 621,222 644,218 689,212 734,206 755,203"
    fill="none" stroke="#f85149" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Shade under WITHOUT -->
  <polygon
    points="80,280 103,278 148,274 192,270 237,266 282,262 305,260 350,255 395,250 418,247 463,242 508,237 531,234 576,228 621,222 644,218 689,212 734,206 755,203 755,280"
    fill="#f85149" fill-opacity="0.07"/>

  <!-- WITHOUT endpoint -->
  <circle cx="755" cy="203" r="5" fill="#f85149"/>
  <rect x="612" y="182" width="130" height="30" fill="#1c0a0a" rx="4" stroke="#f85149" stroke-width="1" stroke-opacity="0.5"/>
  <text x="677" y="196" text-anchor="middle" fill="#f85149" font-size="10" font-weight="700">2,700,000 tokens</text>
  <text x="677" y="207" text-anchor="middle" fill="#ffa198" font-size="9">≈ $8.10 / month</text>

  <!-- WITH line (green) — 9.5k tok/day, max 285k -->
  <polyline
    points="80,280 103,280 148,279 192,279 237,279 282,278 305,278 350,278 395,277 418,277 463,277 508,276 531,276 576,276 621,275 644,275 689,274 734,274 755,274"
    fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Shade under WITH -->
  <polygon
    points="80,280 103,280 148,279 192,279 237,279 282,278 305,278 350,278 395,277 418,277 463,277 508,276 531,276 576,276 621,275 644,275 689,274 734,274 755,274 755,280"
    fill="#3fb950" fill-opacity="0.12"/>

  <!-- WITH endpoint -->
  <circle cx="755" cy="274" r="5" fill="#3fb950"/>
  <rect x="612" y="252" width="130" height="30" fill="#0a1c0a" rx="4" stroke="#3fb950" stroke-width="1" stroke-opacity="0.5"/>
  <text x="677" y="266" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">285,000 tokens</text>
  <text x="677" y="277" text-anchor="middle" fill="#56d364" font-size="9">≈ $0.86 / month</text>

  <!-- Savings callout -->
  <rect x="190" y="80" width="200" height="54" fill="#161b22" rx="8" stroke="#1f6feb" stroke-width="1"/>
  <text x="290" y="98"  text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="700">9.5× fewer tokens</text>
  <text x="290" y="114" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="800">$7.24 saved / month</text>
  <text x="290" y="128" text-anchor="middle" fill="#8b949e" font-size="9">per developer · per project</text>

  <!-- Legend -->
  <line x1="100" y1="332" x2="130" y2="332" stroke="#f85149" stroke-width="2.5"/>
  <text x="136" y="336" fill="#8b949e" font-size="10">Without ContextVault</text>
  <line x1="310" y1="332" x2="340" y2="332" stroke="#3fb950" stroke-width="2.5"/>
  <text x="346" y="336" fill="#8b949e" font-size="10">With ContextVault</text>
</svg>
