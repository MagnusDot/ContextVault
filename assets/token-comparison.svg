<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif">
  <title>Measured token consumption: without vs with ContextVault</title>
  <rect width="800" height="340" fill="#0d1117" rx="12"/>

  <text x="400" y="34" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700">Measured token consumption on real repo tasks</text>
  <text x="400" y="53" text-anchor="middle" fill="#8b949e" font-size="10">claudevault · gpt-5.5 · complete paired benchmark runs</text>

  <text x="80" y="92" fill="#f85149" font-size="11" font-weight="700">WITHOUT CONTEXTVAULT</text>
  <rect x="80" y="106" width="560" height="34" fill="#f8514933" rx="6"/>
  <rect x="80" y="106" width="560" height="34" fill="#f85149" opacity="0.88" rx="6"/>
  <text x="96" y="128" fill="#ffffff" font-size="12" font-weight="600">817,449 total tokens</text>
  <text x="650" y="128" fill="#ffa198" font-size="11" font-weight="700">baseline</text>

  <text x="80" y="166" fill="#3fb950" font-size="11" font-weight="700">WITH CONTEXTVAULT</text>
  <rect x="80" y="180" width="560" height="34" fill="#3fb95024" rx="6"/>
  <rect x="80" y="180" width="258" height="34" fill="#3fb950" opacity="0.9" rx="6"/>
  <text x="96" y="202" fill="#ffffff" font-size="12" font-weight="600">376,851 total tokens</text>
  <text x="650" y="202" fill="#56d364" font-size="11" font-weight="700">53.9% less</text>

  <line x1="80" y1="236" x2="720" y2="236" stroke="#30363d" stroke-width="1"/>

  <rect x="80" y="258" width="145" height="48" fill="#161b22" rx="8" stroke="#30363d"/>
  <text x="152" y="278" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="700">Prompt tokens</text>
  <text x="152" y="296" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="800">54.0% less</text>

  <rect x="245" y="258" width="145" height="48" fill="#161b22" rx="8" stroke="#30363d"/>
  <text x="318" y="278" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="700">Completion tokens</text>
  <text x="318" y="296" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="800">52.8% less</text>

  <rect x="410" y="258" width="145" height="48" fill="#161b22" rx="8" stroke="#30363d"/>
  <text x="482" y="278" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="700">Agent turns</text>
  <text x="482" y="296" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="800">46.0% less</text>

  <rect x="575" y="258" width="145" height="48" fill="#13230f" rx="8" stroke="#3fb950" stroke-opacity="0.7"/>
  <text x="648" y="278" text-anchor="middle" fill="#56d364" font-size="10" font-weight="700">Best task run</text>
  <text x="648" y="296" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="800">84.7% less</text>

  <rect x="300" y="70" width="200" height="26" fill="#1f6feb" rx="13"/>
  <text x="400" y="87" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">2.17× average efficiency gain</text>
</svg>
