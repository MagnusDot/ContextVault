<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif">
  <title>Measured token reduction by benchmark task</title>
  <rect width="800" height="360" fill="#0d1117" rx="12"/>
  <text x="400" y="34" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">Measured savings by benchmark task</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="10">total tokens saved vs. baseline · complete paired runs</text>

  <text x="235" y="82" fill="#6e7681" font-size="9">0%</text>
  <text x="372" y="82" fill="#6e7681" font-size="9">30%</text>
  <text x="510" y="82" fill="#6e7681" font-size="9">60%</text>
  <text x="645" y="82" fill="#6e7681" font-size="9">90%</text>
  <line x1="250" y1="90" x2="250" y2="288" stroke="#21262d"/>
  <line x1="388" y1="90" x2="388" y2="288" stroke="#21262d"/>
  <line x1="526" y1="90" x2="526" y2="288" stroke="#21262d"/>
  <line x1="664" y1="90" x2="664" y2="288" stroke="#21262d"/>

  <text x="70" y="116" fill="#e6edf3" font-size="11" font-weight="700">rate-limiter</text>
  <rect x="250" y="100" width="460" height="24" fill="#161b22" rx="5"/>
  <rect x="250" y="100" width="373" height="24" fill="#3fb950" opacity="0.9" rx="5"/>
  <text x="635" y="117" fill="#56d364" font-size="11" font-weight="800">73.0%</text>
  <text x="720" y="117" fill="#8b949e" font-size="9">28 → 10 turns</text>

  <text x="70" y="154" fill="#e6edf3" font-size="11" font-weight="700">websocket-broadcast</text>
  <rect x="250" y="138" width="460" height="24" fill="#161b22" rx="5"/>
  <rect x="250" y="138" width="289" height="24" fill="#3fb950" opacity="0.9" rx="5"/>
  <text x="551" y="155" fill="#56d364" font-size="11" font-weight="800">56.6%</text>
  <text x="720" y="155" fill="#8b949e" font-size="9">31 → 15 turns</text>

  <text x="70" y="192" fill="#e6edf3" font-size="11" font-weight="700">bm25-recency-boost</text>
  <rect x="250" y="176" width="460" height="24" fill="#161b22" rx="5"/>
  <rect x="250" y="176" width="274" height="24" fill="#3fb950" opacity="0.9" rx="5"/>
  <text x="536" y="193" fill="#56d364" font-size="11" font-weight="800">53.6%</text>
  <text x="720" y="193" fill="#8b949e" font-size="9">23 → 14 turns</text>

  <text x="70" y="230" fill="#e6edf3" font-size="11" font-weight="700">new-mcp-tool-full</text>
  <rect x="250" y="214" width="460" height="24" fill="#161b22" rx="5"/>
  <rect x="250" y="214" width="225" height="24" fill="#3fb950" opacity="0.9" rx="5"/>
  <text x="487" y="231" fill="#56d364" font-size="11" font-weight="800">44.0%</text>
  <text x="720" y="231" fill="#8b949e" font-size="9">39 → 27 turns</text>

  <text x="70" y="268" fill="#e6edf3" font-size="11" font-weight="700">token-savings-mcp-tool</text>
  <rect x="250" y="252" width="460" height="24" fill="#161b22" rx="5"/>
  <rect x="250" y="252" width="203" height="24" fill="#3fb950" opacity="0.9" rx="5"/>
  <text x="465" y="269" fill="#56d364" font-size="11" font-weight="800">39.7%</text>
  <text x="720" y="269" fill="#8b949e" font-size="9">16 → 8 turns</text>

  <rect x="80" y="305" width="295" height="34" fill="#13230f" rx="8" stroke="#3fb950" stroke-opacity="0.55"/>
  <text x="228" y="326" text-anchor="middle" fill="#56d364" font-size="11" font-weight="800">Best single run: 84.7% token reduction</text>

  <rect x="405" y="305" width="315" height="34" fill="#161b22" rx="8" stroke="#30363d"/>
  <text x="562" y="326" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">Overall paired benchmark: 53.9% fewer tokens</text>
</svg>
